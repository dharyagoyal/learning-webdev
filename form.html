<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
    <link rel="stylesheet" href="form.css">
    <title>Form</title>
</head>
<body>
    <div>
        <h1>Dharya Goyal Login Form</h1>

        <form>
            <div class="form">
                <div class="form-row">
                    <label for="username">Username :</label>
                    <input type="text" id="username">
                </div>

                <div class="form-row">
                    <label for="pass">Password :</label>
                    <input type="password" id="pass">
                </div>

                <div class="form-row">
                    <label for="mail">Email :</label>
                    <input type="email" id="mail" placeholder="abc@gmail.com">
                </div>
                
                <div class="form-row">
                    <button type="submit" class="btn btn-outline-primary">Submit</button>
                </div>
                
            </div>
        </form>
    </div>


    <form>
        <div class="row mb-3">
            <label for="username" class="col-sm-2 col-form-label">username</label>
            <div class="col-sm-10">
                <input type="email" class="form-control" id="username" placeholder="username">
            </div>
        </div>
        <div class="row mb-3">
            <label for="password" class="col-sm-2 col-form-label">Password</label>
            <div class="col-sm-10">
                <input type="email" class="form-control" id="password" placeholder="password">
            </div>
        </div>
        <div class="row mb-3">
            <label for="password" class="col-sm-2 col-form-label">Email</label>
            <div class="col-sm-10">
                <input type="email" class="form-control" id="password" placeholder="abc@gmail.com">
            </div>
        </div>

        <button class="btn btn-outline-primary">Submit</button>

    </form>    
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
    </script>
</body>
</html>

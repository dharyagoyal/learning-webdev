<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">
    <link rel="stylesheet" href="form.css">
    <title>Bootstrap CSS</title>
</head>
<body>
    <div class="container">
        <h2>Form Demo</h2>
        <form>
            <div class="row">
                <div class="mb-3 col-md-6">
                    <label class="form-label" for="email">Email</label>
                    <input type="text" class="form-control" placeholder="Email" id="email">
                </div>

                <div class="mb-3 col-md-6">
                    <label class="form-label" for="password">Password</label>
                    <input type="address" class="form-control" placeholder="Password" id="password">
                </div>
            </div>
            
            <div class="mb-3">
                <select class="form-select">
                    <option selected>Select an option</option>
                    <option value="one">One</option>
                    <option value="two">Two</option>
                    <option value="three">Three</option>
                </select>
            </div>

            <div class="normal mb-3">
                <input type="checkbox" name="T&C" id="normal-agree">
                <label for="normal-agree">Agree</label>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="T&C" id="agree" class="form-check-input">
                <label for="agree" class="form-check-label">Agree</label>
            </div>
            <div class="mb-3 form-check">
                <input type="radio" name="T&C" id="radiobs" class="form-check-input">
                <label for="radiobs" class="form-check-label">Agree</label>
            </div>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
                <label class="form-check-label" for="switchCheckDefault">Default switch checkbox input</label>
            </div>
        </form>
    </div>
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous">
    </script>
</body>
</html>
